# ============================================
# RallyAPI - Docker Compose
# ============================================
# Usage:
#   docker compose up -d          (start everything)
#   docker compose logs -f api    (watch API logs)
#   docker compose down           (stop everything)
#   docker compose down -v        (stop + delete DB data)
# ============================================

services:

  # --- RallyAPI (.NET 8) ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rally-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Database=Host=postgres;Port=5432;Database=rallydb;Username=rally;Password=rally123
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=rallydb;Username=rally;Password=rally123
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Issuer=RallyAPI
      - JwtSettings__Audience=RallyApp
      - JwtSettings__AccessTokenExpirationMinutes=15
      - JwtSettings__RefreshTokenExpirationDays=30
      - JwtSettings__PrivateKeyPath=Keys/private.pem
      - JwtSettings__PublicKeyPath=Keys/public.pem
    volumes:
      # Mount RSA keys from host (generate once, reuse)
      - ./src/RallyAPI.Host/Keys:/app/Keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rally-network

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: rally-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rallydb
      POSTGRES_USER: rally
      POSTGRES_PASSWORD: rally123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rally -d rallydb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rally-network

  # --- Redis ---
  redis:
    image: redis:alpine
    container_name: rally-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - rally-network

volumes:
  pgdata:
  redisdata:

networks:
  rally-network:
    driver: bridge
